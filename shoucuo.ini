[custom]
;本配置由于吃饱了撑的手搓
;参考项目如下
;# > wmsxwdsh Personal Rules：https://raw.githubusercontent.com/wmsxwdsh/ClashSub/main/wmsxwdsh20230715.ini
;# > blackmatrix7 Clash Rules：https://github.com/blackmatrix7/ios_rule_script/tree/master/rule/Clash
;# > ACL4SSR Clash Config：https://github.com/ACL4SSR/ACL4SSR/tree/master/Clash/config

custom_proxy_group=👉 手动切换`select`[]🎲 随机节点`[]🔯 故障转移`[]DIRECT
custom_proxy_group=🎲 随机节点`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=💬 Ai相关`select`[]👉 手动切换`[]🔯 故障转移
custom_proxy_group=🎮 游戏平台`select`[]👉 手动切换`[]🔯 故障转移
custom_proxy_group=📺 港台番剧`select`[]港台节点
custom_proxy_group=🌍 国际媒体`select`[]👉 手动切换`[]🔯 故障转移
custom_proxy_group=🐟 其他网站`select`[]👉 手动切换`[]🔯 故障转移
custom_proxy_group=港台节点`url-test`(香港|HK|HKG|Hong Kong|台湾|TW|TWN|Taiwan|)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔀 不走梯子`select`[]DIRECT
custom_proxy_group=🚫 广告拦截`select`[]REJECT

